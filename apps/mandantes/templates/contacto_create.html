{% extends "base.html" %}

{% block content %}

<main class="container">
    <div class="row">
        <div class="mt-5 bg-light p-4 rounded">
            <form action="{% url 'contacto_create' mandante.id %}" method="POST" class="card card-body">
                <h1 class="text-center">Nuevo contacto</h1>
                {{ error }}
                {% csrf_token %}
                {{ form}}
                <button type="submit" class="btn btn-dark w-100 mt-2">Guardar</button>
                <a href="{% url 'mandantes'  %}" class="btn btn-secondary w-100  mb-2">Volver</a>
            </form>
        </div>
    </div>
</main>



{% endblock %}
